name: Run Scraper

on:
  schedule:
    - cron: "*/15 11-23 * * *"  # every 15 min, 6am–6pm ET (UTC 11–23)
    - cron: "*/15 0-2 * * *"    # every 15 min, 7pm–10pm ET (UTC 0–2)
  workflow_dispatch:
    inputs:
      limit:
        description: "Articles per source (leave empty for full run)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: sentence-transformers-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        working-directory: scraper
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            python compare.py --limit "$LIMIT"
          else
            python compare.py
          fi
